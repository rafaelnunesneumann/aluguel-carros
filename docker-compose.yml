version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aluguel-carros-db
    environment:
      POSTGRES_DB: aluguel_carros
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
